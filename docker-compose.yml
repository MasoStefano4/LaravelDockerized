networks:
  projectname:

volumes:
  node_modules:

services:
  nginx:
    image: nginx:stable-alpine
    container_name: project_name_nginx
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - postgres
    networks:
      - projectname

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_name_php
    volumes:
      - ./src:/var/www/html
      - node_modules:/var/www/html/node_modules
    ports:
      - "9000:9000"
    networks:
      - projectname

  postgres:
    image: postgres:16
    container_name: project_name_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: laravel_app
      POSTGRES_USER: laravel_user
      POSTGRES_PASSWORD: secret
    networks:
      - projectname
    volumes:
      - ./postgres:/var/lib/postgresql/data

  composer:
    image: composer:latest
    user: "1000:1000"
    container_name: project_name_composer
    volumes:
      - ./src:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - php
    networks:
      - projectname

  npm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_name_npm
    user: root
    volumes:
      - ./src:/var/www/html
      - node_modules:/var/www/html/node_modules
    working_dir: /var/www/html
    entrypoint: ['npm']
    command: run dev
    ports:
      - "5173:5173"
    networks:
      - projectname

  artisan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_name_artisan
    volumes:
      - ./src:/var/www/html
    depends_on:
      - postgres
    working_dir: /var/www/html
    entrypoint: ['php', '/var/www/html/artisan']
    networks:
      - projectname

  redis:
    image: redis:alpine
    container_name: project_name_redis
    ports:
      - "6379:6379"
    networks:
      - projectname